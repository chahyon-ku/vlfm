name: vlfm

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  # python
  - python=3.9
  - pip=23
  - setuptools=69
  # cuda
  - cuda=12.8
  # pytorch
  - cudnn
  - cusparselt
  - nccl
  - libnvshmem3
  - sympy
  - pip:
    - --index-url https://download.pytorch.org/whl/cu128
    - torch==2.7.0
    - torchaudio==2.7.0
    - torchvision==0.22.0
  # c/c++
  - gcc=11
  - gxx=11
  - gxx_linux-64=11
  - cmake=3.26
  - ninja
  - pybind11
  - python-devtools
  # image
  - opencv
  - scikit-learn
  - scikit-image
  - imageio
  - imageio-ffmpeg
  - ffmpeg
  # visualization
  - pandas
  - plotly
  - matplotlib
  # utils
  - einops
  - nvtx
  - hydra-core
  - natsort
  - tqdm
  # habitat-sim
  - pip:
    - gym==0.23
  - trimesh=3
  - pybullet
  - libopengl-devel
  - libglx-devel
  - libegl-devel
  - numba
  - quaternion
  # habitat-lab
  - pip:
    - -e third_party/habitat-lab/habitat-lab
    - -e third_party/habitat-lab/habitat-baselines
  - python-lmdb
  - ifcfg
  # vlfm
  - gdown
  - pip:
    # mobile_sam
    - -e third_party/mobile-sam
    # grounding_dino
    - -e third_party/grounding-dino
    # yolov7
    - -e third_party/yolov7
    - seaborn
    # lavis
    - -e third_party/lavis
    - blis<=1.2.0  # speed up by using pre-built wheels
    - huggingface_hub<0.26
  - pip:
    # vlfm
    - flask
    - open3d
    - numpy == 1.26.4
    - frontier_exploration @ git+https://github.com/naokiyokoyama/frontier_exploration.git
    - depth_camera_filtering @ git+https://github.com/naokiyokoyama/depth_camera_filtering
    - -e .
